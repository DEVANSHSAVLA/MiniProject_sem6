apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chain-guard-inference
  labels:
    app: ai-chain-guard
    component: inference-node
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-chain-guard
      component: inference-node
  template:
    metadata:
      labels:
        app: ai-chain-guard
        component: inference-node
      annotations:
        sidecar.istio.io/inject: "true" # mTLS / Zero Trust Service Mesh
    spec:
      containers:
      - name: inference-engine
        image: aichain/guard:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        ports:
        - containerPort: 5000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-chain-guard-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-chain-guard-inference
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
